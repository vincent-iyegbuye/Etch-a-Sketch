<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch A Sketch</title>
    <link rel="stylesheet" href="etch.css">
</head>
<body>
    <h2>Etch-a-Sketch</h2>
    <section class="controls">
      <button id="clear-btn">🧹 Clear</button>

      <label for="grid-size">📏 Resize Grid</label>
      <button type="input" id="resizeBtn" placeholder="">Resize</button>

      <label for="color-picker">🎨 Color Picker</label>
      <input type="color" id="color-picker">

      <button id="rainbow-btn">🌈 Rainbow Mode</button>
      <button id="eraser-btn">🧼 Eraser</button>
      <button id="darken-btn">🌙 Dark Mode</button>
</section>
    <div class="container"></div>
    <script src="etch.js"></script>
</body>
</html>
